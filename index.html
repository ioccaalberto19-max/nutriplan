<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NutriPlan Pro — Gestionale Nutrizionista</title>

<!-- PWA META -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1915">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriPlan">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1915;
    --paper: #f4f1ea;
    --paper-2: #ebe6da;
    --paper-3: #e0dace;
    --accent: #c84b31;
    --olive: #5c6b3a;
    --gold: #b8862f;
    --rule: #1a191522;
    --muted: #6b6858;
    --danger: #8b2e1f;
    --success: #3a6b3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(26,25,21,0.12) 1px, transparent 0);
    background-size: 24px 24px;
    opacity: 0.3; pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* === TOP BAR === */
  .topbar {
    background: var(--ink); color: var(--paper);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 24px;
    border-bottom: 3px solid var(--accent);
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 800; font-style: italic;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .brand span { color: var(--accent); font-style: normal; }
  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    opacity: 0.5; text-transform: uppercase;
  }

  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

  .topbar-btn {
    background: transparent; color: var(--paper);
    border: 1px solid rgba(244,241,234,0.3);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .topbar-btn:hover { background: var(--paper); color: var(--ink); }

  /* === LAYOUT === */
  .shell {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 60px);
  }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--ink); }
  }

  /* === SIDEBAR === */
  .sidebar {
    background: var(--paper-2);
    border-right: 1px solid var(--ink);
    padding: 24px 20px;
  }

  .sidebar-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
  }

  .sidebar-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
  }
  .sidebar-head .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 0.1em;
  }

  .add-client-btn {
    width: 100%;
    background: var(--ink); color: var(--paper);
    border: none; padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer; margin-bottom: 20px;
    transition: all 0.15s;
  }
  .add-client-btn:hover { background: var(--accent); }

  .client-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

  .client-item {
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .client-item:hover { border-color: var(--ink); transform: translateX(2px); }
  .client-item.active { background: var(--ink); color: var(--paper); }

  .client-item-name {
    font-family: 'Fraunces', serif;
    font-size: 15px; font-weight: 500;
    margin-bottom: 2px;
  }
  .client-item-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
  }
  .client-item.active .client-item-meta { color: rgba(244,241,234,0.6); }

  .empty-sidebar {
    text-align: center; padding: 40px 20px;
    color: var(--muted);
    font-family: 'Fraunces', serif;
    font-style: italic; font-size: 14px;
  }

  /* === MAIN === */
  .main {
    padding: 32px 40px 80px;
    overflow-x: hidden;
  }

  .welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; text-align: center;
  }
  .welcome-ornament {
    font-size: 72px; color: var(--accent);
    font-style: italic; font-family: 'Fraunces', serif;
    line-height: 1; margin-bottom: 20px;
  }
  .welcome h1 {
    font-family: 'Fraunces', serif;
    font-size: 48px; font-weight: 400;
    font-style: italic; letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .welcome p {
    font-family: 'Fraunces', serif;
    font-size: 17px; color: var(--muted);
    max-width: 420px; line-height: 1.6;
  }

  /* === CLIENT HEADER === */
  .client-header {
    display: flex; justify-content: space-between;
    align-items: flex-end; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--ink);
    gap: 20px; flex-wrap: wrap;
  }
  .client-title {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 500;
    letter-spacing: -0.01em; margin-bottom: 4px;
  }
  .client-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  .client-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--ink);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; color: var(--ink);
  }
  .icon-btn:hover { background: var(--ink); color: var(--paper); }
  .icon-btn.danger { border-color: var(--danger); color: var(--danger); }
  .icon-btn.danger:hover { background: var(--danger); color: var(--paper); }
  .icon-btn.accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .icon-btn.accent:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* === WORKFLOW STEPS === */
  .workflow {
    display: flex; gap: 0;
    margin-bottom: 32px;
    border: 1px solid var(--ink);
    background: var(--paper-2);
    overflow: hidden;
    flex-wrap: wrap;
  }

  .step {
    flex: 1;
    min-width: 140px;
    padding: 14px 16px;
    background: transparent;
    border: none;
    border-right: 1px solid var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: inherit;
    color: var(--ink);
    position: relative;
  }
  .step:last-child { border-right: none; }
  .step:hover { background: var(--paper-3); }
  .step.active { background: var(--ink); color: var(--paper); }

  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    opacity: 0.6; margin-bottom: 3px;
    display: block;
  }
  .step-name {
    font-family: 'Fraunces', serif;
    font-size: 15px; font-weight: 500;
    font-style: italic;
  }

  .step-content { display: none; }
  .step-content.active { display: block; }

  /* === DASHBOARD === */
  .dash-intro {
    background: linear-gradient(to right, var(--paper-2), var(--paper));
    border-left: 4px solid var(--accent);
    padding: 18px 22px;
    margin-bottom: 24px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.5;
  }
  .dash-intro strong { font-style: normal; color: var(--accent); }

  .dash-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media(max-width:900px){ .dash-grid{grid-template-columns:1fr;} }

  .card {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 22px;
    position: relative;
  }

  .card-label {
    position: absolute;
    top: -10px; left: 16px;
    background: var(--paper);
    padding: 0 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
  }

  .card h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
    font-style: italic;
    margin-bottom: 16px;
  }

  /* CHECKLIST */
  .checklist {
    list-style: none;
  }
  .checklist li {
    padding: 10px 0;
    padding-left: 28px;
    position: relative;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    line-height: 1.4;
    border-bottom: 1px dashed var(--rule);
  }
  .checklist li:last-child { border-bottom: none; }
  .checklist li::before {
    content: '◯';
    position: absolute; left: 0; top: 10px;
    color: var(--muted);
  }
  .checklist li.done::before { content: '●'; color: var(--olive); }
  .checklist li.warn::before { content: '▲'; color: var(--accent); }
  .checklist li strong { color: var(--accent); font-style: italic; }
  .checklist li .small {
    display: block; margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* TREND */
  .trend-row {
    display: flex; justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed var(--rule);
    font-family: 'Fraunces', serif;
    font-size: 14px;
  }
  .trend-row:last-child { border-bottom: none; }
  .trend-row span:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    padding-top: 2px;
  }
  .trend-row .val { font-weight: 500; }
  .trend-row .diff {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-left: 8px;
  }
  .diff-down { color: var(--olive); }
  .diff-up { color: var(--accent); }

  /* PHOTO COMPARE */
  .photo-compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .photo-compare-slot {
    aspect-ratio: 3/4;
    background: var(--paper-3);
    border: 1px solid var(--ink);
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .photo-compare-slot img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .photo-compare-slot .lbl {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(26,25,21,0.85);
    color: var(--paper);
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
  }
  .photo-compare-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-style: italic;
    text-align: center; padding: 10px;
    font-family: 'Fraunces', serif; font-size: 12px;
  }

  /* NOTES PREVIEW */
  .note-preview {
    padding: 12px 0;
    border-bottom: 1px dashed var(--rule);
  }
  .note-preview:last-child { border-bottom: none; }
  .note-preview-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 4px;
  }
  .note-preview-text {
    font-family: 'Fraunces', serif;
    font-size: 13px; line-height: 1.4;
    color: var(--ink);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* === STRATEGY TAB === */
  .strategy-intro {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
  }
  @media(max-width:700px){ .strategy-intro{grid-template-columns:1fr;} }

  .strategy-intro h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    font-style: italic;
    margin-bottom: 6px;
  }
  .strategy-intro p {
    font-family: 'Fraunces', serif;
    font-size: 14px; color: var(--muted);
    line-height: 1.5;
  }

  .current-target {
    text-align: right;
    background: var(--ink); color: var(--paper);
    padding: 16px 22px;
  }
  @media(max-width:700px){ .current-target{text-align:left;} }
  .current-target .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    opacity: 0.6; margin-bottom: 4px;
  }
  .current-target .val {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500;
    line-height: 1;
  }
  .current-target .val small {
    font-size: 13px; opacity: 0.6; font-style: italic;
  }

  /* TDEE + MACROS editor */
  .targets-editor {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
  }

  .targets-editor h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
    font-style: italic;
    margin-bottom: 4px;
  }
  .targets-editor .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--rule);
    text-transform: uppercase;
  }

  .tdee-hero {
    background: var(--ink); color: var(--paper);
    padding: 24px; margin-bottom: 20px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .tdee-hero::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 200px; height: 200px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.8;
  }
  @media(max-width:700px){ .tdee-hero{grid-template-columns:1fr;} }

  .tdee-main-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    opacity: 0.6; margin-bottom: 6px;
    position: relative;
  }
  .tdee-main-val {
    font-family: 'Fraunces', serif;
    font-size: 56px; font-weight: 400;
    line-height: 1; position: relative;
  }
  .tdee-main-val small {
    font-size: 16px; opacity: 0.6; font-style: italic; margin-left: 6px;
  }
  .tdee-main-sub {
    font-family: 'Fraunces', serif;
    font-style: italic; font-size: 14px;
    opacity: 0.7; margin-top: 8px;
    position: relative;
  }
  .tdee-side { border-left: 1px solid rgba(244,241,234,0.2); padding-left: 20px; position: relative; }
  .tdee-side-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    opacity: 0.5; margin-bottom: 4px;
  }
  .tdee-side-val {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 500;
  }

  .macros-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .macro-box {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .macro-box::after {
    content:'';
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  }
  .macro-box[data-m="p"]::after { background: var(--accent); }
  .macro-box[data-m="c"]::after { background: var(--olive); }
  .macro-box[data-m="f"]::after { background: var(--gold); }

  .macro-box-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 4px;
  }
  .macro-box-value {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 500;
    line-height: 1;
  }
  .macro-box-value small {
    font-size: 13px; color: var(--muted); font-style: italic;
    margin-left: 2px;
  }
  .macro-box-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    margin-top: 4px;
  }

  /* STRATEGY ACTIONS */
  .strategy-actions {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 24px;
  }

  .strategy-actions h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
    font-style: italic;
    margin-bottom: 4px;
  }
  .strategy-actions .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--rule);
    text-transform: uppercase;
  }

  .adjust-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }

  .adjust-btn {
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-style: italic;
  }
  .adjust-btn:hover {
    background: var(--ink); color: var(--paper);
    transform: translate(-1px,-1px);
    box-shadow: 2px 2px 0 var(--accent);
  }
  .adjust-btn .delta {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal; font-size: 11px;
    letter-spacing: 0.1em;
    display: block; margin-top: 2px;
    color: var(--accent);
  }

  /* === FIELDS === */
  .field { margin-bottom: 14px; }
  .field.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field.row-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }

  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], input[type="date"],
  select, textarea {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 10px 12px;
    font-family: 'Fraunces', serif;
    font-size: 15px; color: var(--ink);
    transition: all 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 2px 2px 0 var(--accent);
    transform: translate(-1px,-1px);
  }

  textarea { min-height: 80px; resize: vertical; font-family: 'Fraunces', serif; line-height: 1.5; }

  select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%231a1915' stroke-width='1.5' fill='none'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 6px;
  }
  .choice { position: relative; }
  .choice input { position: absolute; opacity: 0; pointer-events: none; }
  .choice label {
    display: block; text-align: center;
    padding: 9px 6px;
    background: var(--paper);
    border: 1px solid var(--ink);
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-size: 13px; color: var(--ink);
    text-transform: none; letter-spacing: 0;
    margin: 0;
  }
  .choice input:checked + label {
    background: var(--ink); color: var(--paper);
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { position: relative; }
  .chip input { position: absolute; opacity: 0; pointer-events: none; }
  .chip label {
    display: inline-block;
    padding: 5px 12px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--paper);
    margin: 0;
  }
  .chip input:checked + label {
    background: var(--olive); color: var(--paper); border-color: var(--olive);
  }

  .btn-primary {
    width: 100%;
    background: var(--ink); color: var(--paper);
    border: none;
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover {
    background: var(--accent);
    transform: translate(-2px,-2px);
    box-shadow: 4px 4px 0 var(--ink);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  /* === PLAN EDITOR === */
  .plan-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .plan-head-title h3 {
    font-family: 'Fraunces', serif;
    font-size: 24px; font-weight: 500;
    font-style: italic;
  }
  .plan-head-title p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .plan-targets-badge {
    background: var(--ink); color: var(--paper);
    padding: 10px 18px;
    display: flex; gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .plan-targets-badge span { display: flex; flex-direction: column; gap: 2px; }
  .plan-targets-badge span b {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 500;
    font-style: normal;
  }
  .plan-targets-badge span::before {
    content: attr(data-lbl);
    font-size: 9px; opacity: 0.5;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .plan-toolbar {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 12px 16px;
    background: var(--paper-2);
    border: 1px solid var(--ink);
    margin-bottom: 20px;
    align-items: center;
  }

  .plan-toolbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    margin-right: 8px;
  }

  .meal-editor {
    margin-bottom: 24px;
    border: 1px solid var(--ink);
    background: var(--paper-2);
  }

  .meal-editor-head {
    background: var(--ink); color: var(--paper);
    padding: 14px 20px;
    display: flex; justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .meal-editor-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    font-style: italic;
  }
  .meal-editor-head h3 span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase;
    font-style: normal; opacity: 0.5;
    margin-right: 10px; font-weight: 400;
  }

  .meal-editor-actions { display: flex; gap: 6px; }

  .meal-action-btn {
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(244,241,234,0.3);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .meal-action-btn:hover { background: var(--paper); color: var(--ink); }

  .meal-editor-body {
    padding: 16px 20px;
  }

  .variant-editor {
    margin-bottom: 14px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 12px;
    align-items: start;
  }

  .variant-editor:last-child { margin-bottom: 0; }

  .variant-letter {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    font-weight: 500;
    line-height: 1.2;
    padding-top: 2px;
  }

  .variant-editor textarea {
    border: 1px solid var(--rule);
    background: transparent;
    font-size: 14px;
    min-height: 80px;
    padding: 8px 10px;
    line-height: 1.5;
  }
  .variant-editor textarea:focus {
    border-color: var(--accent);
    background: var(--paper);
  }

  .variant-remove-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .variant-remove-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  .add-variant-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--ink);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .add-variant-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--paper);
  }

  /* RULES EDITOR */
  .rules-editor {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 24px;
    margin-top: 32px;
  }

  .rules-editor h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    font-style: italic;
    margin-bottom: 4px;
  }
  .rules-editor .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--rule);
    text-transform: uppercase;
  }

  .rules-editor textarea {
    min-height: 160px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    line-height: 1.5;
  }

  /* === PRINT VIEW === */
  .print-view {
    display: none;
  }

  @media print {
    body::before, .topbar, .sidebar, .workflow, .client-actions, .plan-toolbar { display: none !important; }
    .shell { grid-template-columns: 1fr; }
    .main { padding: 0; }
    .print-only { display: block; }
    .no-print { display: none !important; }
    .meal-editor { break-inside: avoid; }
    textarea { border: none !important; background: transparent !important; resize: none; }
  }

  /* === MEASUREMENTS === */
  .measurement-entry {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 20px;
    margin-bottom: 16px;
  }
  .measurement-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .measurement-values {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
  }
  .measurement-val {
    background: var(--paper);
    padding: 8px 10px;
    border: 1px solid var(--rule);
  }
  .measurement-val-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 2px;
  }
  .measurement-val-value {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
  }
  .measurement-val-value small { font-size: 11px; color: var(--muted); font-style: italic; }
  .measurement-val-diff {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; margin-top: 2px;
  }

  /* PHOTOS */
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; margin-top: 20px;
  }
  .photo-item {
    position: relative;
    aspect-ratio: 3/4;
    background: var(--paper-2);
    border: 1px solid var(--ink);
    overflow: hidden; cursor: pointer;
    transition: transform 0.15s;
  }
  .photo-item:hover { transform: translateY(-2px); }
  .photo-item img { width: 100%; height: 100%; object-fit: cover; }
  .photo-item-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,25,21,0.9));
    color: var(--paper); padding: 20px 10px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
  }
  .photo-item-delete {
    position: absolute; top: 6px; right: 6px;
    background: var(--paper);
    border: 1px solid var(--ink);
    width: 26px; height: 26px;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .photo-item:hover .photo-item-delete { opacity: 1; }
  .photo-upload {
    border: 2px dashed var(--ink);
    padding: 32px; text-align: center;
    background: var(--paper-2); cursor: pointer;
    transition: all 0.15s;
  }
  .photo-upload:hover {
    background: var(--paper-3);
    border-color: var(--accent);
  }
  .photo-upload p {
    font-family: 'Fraunces', serif;
    font-style: italic; color: var(--muted);
  }

  /* NOTES */
  .note-entry {
    background: var(--paper-2);
    border: 1px solid var(--ink);
    padding: 18px 20px;
    margin-bottom: 12px;
    position: relative;
  }
  .note-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .note-content {
    font-family: 'Fraunces', serif;
    font-size: 15px; line-height: 1.5;
    white-space: pre-wrap;
  }
  .note-delete {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .note-delete:hover { color: var(--danger); }

  /* EMPTY */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
    font-family: 'Fraunces', serif;
    font-style: italic; font-size: 16px;
  }
  .empty-state .ornament {
    font-size: 48px; color: var(--accent);
    margin-bottom: 12px; line-height: 1;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,25,21,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--paper);
    border: 2px solid var(--ink);
    max-width: 500px; width: 100%;
    padding: 32px; position: relative;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 500;
    font-style: italic;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--ink);
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none; border: none;
    font-size: 24px; cursor: pointer;
    color: var(--ink);
    font-family: 'Fraunces', serif;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(26,25,21,0.95);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 40px;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }

  /* SAVE INDICATOR */
  .save-indicator {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--success); color: var(--paper);
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 50;
    border: 1px solid var(--ink);
  }
  .save-indicator.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <div class="brand">Nutri<span>·</span>Plan <em style="font-size:12px;font-weight:400;margin-left:6px;opacity:0.7;">Pro</em></div>
      <div class="brand-sub">Gestionale nutrizionale</div>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="exportData()">↓ Export</button>
      <button class="topbar-btn" onclick="document.getElementById('importFile').click()">↑ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div class="shell">

    <aside class="sidebar">
      <div class="sidebar-head">
        <h3>Clienti</h3>
        <span class="count" id="clientCount">0</span>
      </div>
      <button class="add-client-btn" onclick="openNewClient()">+ Nuovo cliente</button>
      <ul class="client-list" id="clientList"></ul>
    </aside>

    <main class="main" id="mainArea">
      <div class="welcome">
        <div class="welcome-ornament">❦</div>
        <h1>Benvenuto</h1>
        <p>Crea una scheda cliente per iniziare. Il flusso è: <em>feed → strategia → piano</em>.</p>
      </div>
    </main>

  </div>
</div>

<!-- MODALS -->
<div class="modal-backdrop" id="newClientModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('newClientModal')">×</button>
    <h2>Nuovo cliente</h2>
    <div class="field">
      <label>Nome e cognome</label>
      <input type="text" id="newClientName" placeholder="Mario Rossi" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="icon-btn" onclick="closeModal('newClientModal')">Annulla</button>
      <button class="btn-primary" onclick="createClient()" style="margin-top:0;">Crea scheda</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="measureModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('measureModal')">×</button>
    <h2>Nuova misurazione</h2>
    <div class="field row">
      <div><label>Data</label><input type="date" id="mDate"></div>
      <div><label>Peso (kg)</label><input type="number" id="mWeight" step="0.1"></div>
    </div>
    <div class="field row-3">
      <div><label>Vita (cm)</label><input type="number" id="mWaist" step="0.1"></div>
      <div><label>Fianchi (cm)</label><input type="number" id="mHips" step="0.1"></div>
      <div><label>Petto (cm)</label><input type="number" id="mChest" step="0.1"></div>
    </div>
    <div class="field row-3">
      <div><label>Braccio (cm)</label><input type="number" id="mArm" step="0.1"></div>
      <div><label>Coscia (cm)</label><input type="number" id="mThigh" step="0.1"></div>
      <div><label>Polpaccio (cm)</label><input type="number" id="mCalf" step="0.1"></div>
    </div>
    <div class="field">
      <label>Note (opzionale)</label>
      <textarea id="mNotes"></textarea>
    </div>
    <div class="modal-actions">
      <button class="icon-btn" onclick="closeModal('measureModal')">Annulla</button>
      <button class="btn-primary" onclick="saveMeasurement()" style="margin-top:0;">Salva</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="">
</div>

<div class="save-indicator" id="saveIndicator">✓ Salvato</div>

<script>
// ============================================================
// NUTRIPLAN PRO v2 — Feed → Strategia → Piano editabile
// ============================================================

let DATA = { clients: [], activeClientId: null };
let activeStep = 'dashboard';
let saveTimer = null;

function loadData() {
  try {
    const raw = localStorage.getItem('nutriplan_data_v2');
    if (raw) DATA = JSON.parse(raw);
    if (!DATA.clients) DATA.clients = [];
    DATA.clients.forEach(ensureClientShape);
  } catch(e) {
    console.error('Load failed', e);
    DATA = { clients: [], activeClientId: null };
  }
}

function ensureClientShape(c) {
  c.profile = c.profile || {};
  const p = c.profile;
  if (p.sex === undefined) p.sex = 'M';
  if (p.exclusions === undefined) p.exclusions = [];
  if (p.diet === undefined) p.diet = 'onnivoro';
  if (p.activity === undefined) p.activity = 1.55;
  if (p.goal === undefined) p.goal = 'maintain';
  if (p.waterL === undefined) p.waterL = 2;
  if (p.trainingDays === undefined) p.trainingDays = 3;
  c.calc = c.calc || null;
  c.targets = c.targets || null; // { kcal, p, c, f } manuali, se diversi da calc
  c.plan = c.plan || null; // { meals: [{name, variants: [text]}], rules: text }
  c.measurements = c.measurements || [];
  c.photos = c.photos || [];
  c.notes = c.notes || [];
}

function saveData(silent = false) {
  try {
    localStorage.setItem('nutriplan_data_v2', JSON.stringify(DATA));
    if (!silent) showSaveIndicator();
  } catch(e) {
    alert('Spazio esaurito! Esporta i dati e rimuovi qualche foto.');
  }
}

function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

function uid() {
  return 'c' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function escapeHtml(s) {
  return String(s==null?'':s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

function getActiveClient() {
  return DATA.clients.find(c => c.id === DATA.activeClientId);
}

// === EXPORT / IMPORT ===
function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nutriplan_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.clients) throw new Error('Formato non valido');
      if (confirm(`Importare ${imported.clients.length} clienti? I dati attuali verranno sostituiti.`)) {
        DATA = imported;
        DATA.clients.forEach(ensureClientShape);
        saveData();
        DATA.activeClientId = null;
        renderSidebar();
        renderMain();
      }
    } catch(err) { alert('File non valido: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// === MODAL ===
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function openNewClient() {
  document.getElementById('newClientName').value = '';
  openModal('newClientModal');
  setTimeout(() => document.getElementById('newClientName').focus(), 50);
}

function createClient() {
  const name = document.getElementById('newClientName').value.trim();
  if (!name) return alert('Inserisci un nome');
  const client = {
    id: uid(),
    name,
    createdAt: new Date().toISOString(),
    profile: {
      sex: 'M', age: null, height: null, startWeight: null,
      activity: 1.55, goal: 'maintain',
      diet: 'onnivoro', exclusions: [],
      waterL: 2, trainingDays: 3,
    },
    calc: null, targets: null, plan: null,
    measurements: [], photos: [], notes: [],
  };
  DATA.clients.push(client);
  DATA.activeClientId = client.id;
  activeStep = 'profile'; // new client → start from profile
  saveData(true);
  closeModal('newClientModal');
  renderSidebar();
  renderMain();
}

function deleteClient(id) {
  if (!confirm('Eliminare definitivamente questo cliente?')) return;
  DATA.clients = DATA.clients.filter(c => c.id !== id);
  if (DATA.activeClientId === id) DATA.activeClientId = null;
  saveData(true);
  renderSidebar();
  renderMain();
}

function selectClient(id) {
  DATA.activeClientId = id;
  activeStep = 'dashboard';
  renderSidebar();
  renderMain();
}

// === SIDEBAR ===
function renderSidebar() {
  const list = document.getElementById('clientList');
  document.getElementById('clientCount').textContent = DATA.clients.length;

  if (DATA.clients.length === 0) {
    list.innerHTML = '<li class="empty-sidebar">Nessun cliente. Crea la prima scheda.</li>';
    return;
  }

  list.innerHTML = DATA.clients.map(c => {
    const active = c.id === DATA.activeClientId ? 'active' : '';
    const lastM = c.measurements.length ? c.measurements[c.measurements.length-1] : null;
    const kg = lastM ? lastM.weight : (c.profile.startWeight || '—');
    const goal = c.profile.goal === 'cut' ? 'Cut' : c.profile.goal === 'bulk' ? 'Bulk' : 'Maint';
    return `<li class="client-item ${active}" onclick="selectClient('${c.id}')">
      <div class="client-item-name">${escapeHtml(c.name)}</div>
      <div class="client-item-meta">${kg} kg · ${goal}</div>
    </li>`;
  }).join('');
}

// === WORKFLOW NAV ===
function switchStep(step) {
  activeStep = step;
  renderMain();
}

// === MAIN RENDER ===
function renderMain() {
  const main = document.getElementById('mainArea');
  const client = getActiveClient();

  if (!client) {

  const lastM = client.measurements.length ? client.measurements[client.measurements.length-1] : null;

  if (client.profile.age) subtitleParts.push(client.profile.age + ' anni');
  if (client.profile.sex) subtitleParts.push(client.profile.sex === 'M' ? 'Uomo' : 'Donna');
  if (currentWeight) subtitleParts.push(currentWeight + ' kg');
  if (client.profile.height) subtitleParts.push(client.profile.height + ' cm');

  const profileComplete = client.profile.age && client.profile.height && client.profile.startWeight;

  main.innerHTML = `

      <div class="client-actions">

      <button class="step ${activeStep==='dashboard'?'active':''}" onclick="switchStep('dashboard')">

        <span class="step-name">Dashboard</span>
      </button>
      <button class="step ${activeStep==='profile'?'active':''}" onclick="switchStep('profile')">
        <span class="step-num">02 — DATI</span>
        <span class="step-name">Profilo</span>
      </button>
      <button class="step ${activeStep==='strategy'?'active':''}" onclick="switchStep('strategy')">
        <span class="step-num">03 — ANALISI</span>
        <span class="step-name">Strategia</span>
      </button>
      <button class="step ${activeStep==='plan'?'active':''}" onclick="switchStep('plan')">
        <span class="step-num">04 — OUTPUT</span>
        <span class="step-name">Piano</span>
      </button>
      <button class="step ${activeStep==='measure'?'active':''}" onclick="switchStep('measure')">
        <span class="step-num">+</span>
        <span class="step-name">Misure</span>
      </button>
      <button class="step ${activeStep==='photos'?'active':''}" onclick="switchStep('photos')">
        <span class="step-num">+</span>
        <span class="step-name">Foto</span>
      </button>
      <button class="step ${activeStep==='notes'?'active':''}" onclick="switchStep('notes')">
        <span class="step-num">+</span>
        <span class="step-name">Note</span>
      </button>
    </div>

    <div class="step-content active">
      ${renderStepContent(client, activeStep, profileComplete)}
    </div>
  `;
}

function renderStepContent(client, step, profileComplete) {
  switch (step) {
    case 'dashboard': return renderDashboard(client);
    case 'profile': return renderProfile(client);
    case 'strategy': return renderStrategy(client, profileComplete);
    case 'plan': return renderPlan(client, profileComplete);
    case 'measure': return renderMeasure(client);
    case 'photos': return renderPhotos(client);
    case 'notes': return renderNotes(client);
    default: return '';
  }
}

// STEP 01 — DASHBOARD (FEED REVIEW)
// ============================================================
function renderDashboard(client) {
  const ms = [...client.measurements].sort((a,b) => new Date(a.date) - new Date(b.date));
  const latest = ms[ms.length - 1] || null;
  const previous = ms[ms.length - 2] || null;
  const photos = [...client.photos].sort((a,b) => new Date(a.date) - new Date(b.date));
  const firstPhoto = photos[0];
  const lastPhoto = photos[photos.length - 1];
  const recentNotes = [...client.notes].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 3);

  // CHECKLIST — what changed?
  const checklist = buildChecklist(client, latest, previous, photos, recentNotes);

  // TREND VALUES
  const fields = [
    {k:'weight', label:'Peso', unit:'kg'},
    {k:'waist', label:'Vita', unit:'cm'},
    {k:'hips', label:'Fianchi', unit:'cm'},
    {k:'chest', label:'Petto', unit:'cm'},
    {k:'arm', label:'Braccio', unit:'cm'},
    {k:'thigh', label:'Coscia', unit:'cm'},
  ];

  const trendRows = fields.map(f => {
    if (!latest || latest[f.k] == null) return '';
    const curr = latest[f.k];
    const prev = previous ? previous[f.k] : null;
    let diffHtml = '';
    if (prev != null && Math.abs(curr - prev) > 0.05) {
      const d = (curr - prev);
      const cls = d < 0 ? 'diff-down' : 'diff-up';
      diffHtml = `<span class="diff ${cls}">${d > 0 ? '+' : ''}${d.toFixed(1)}</span>`;
    }
    return `<div class="trend-row">
      <span>${f.label}</span>
      <span class="val">${curr} <small style="color:var(--muted);font-style:italic;">${f.unit}</small>${diffHtml}</span>
    </div>`;
  }).filter(Boolean).join('');

  return `
    <div class="dash-intro">
      <strong>Benvenuto nella revisione di ${escapeHtml(client.name.split(' ')[0])}.</strong>
      Questo è il punto di partenza: rivedi cosa è cambiato, leggi le ultime note, confronta le foto — poi decidi la strategia.
    </div>

    <div class="dash-grid">

      <div class="card">
        <span class="card-label">Cosa è cambiato</span>
        <h3>Checklist di revisione</h3>
        ${checklist.length ? `<ul class="checklist">${checklist.map(item =>
          `<li class="${item.type}">${item.text}${item.small ? `<span class="small">${item.small}</span>` : ''}</li>`
        ).join('')}</ul>` : `<div class="empty-state" style="padding:20px 0;"><p>Nessun dato ancora da analizzare.<br>Aggiungi una misurazione per iniziare.</p></div>`}
      </div>

      <div class="card">
        <span class="card-label">Sintesi numerica</span>
        <h3>Ultima rilevazione</h3>
        ${latest ? `
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:0.1em;margin-bottom:12px;">
            ${new Date(latest.date).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'})}
            ${previous ? ` — vs ${new Date(previous.date).toLocaleDateString('it-IT',{day:'numeric',month:'short'})}` : ''}
          </div>
          ${trendRows || '<div style="font-style:italic;color:var(--muted);padding:12px 0;">Nessuna misurazione registrata.</div>'}
        ` : `<div class="empty-state" style="padding:20px 0;"><p>Nessuna misurazione.<br>Aggiungine una dalla tab Misure.</p></div>`}
      </div>

    </div>

    <div class="dash-grid">
      <div class="card">
        <span class="card-label">Prima vs Ultima</span>
        <h3>Confronto foto</h3>
        <div class="photo-compare">
          <div class="photo-compare-slot" ${firstPhoto ? `onclick="openLightbox('${firstPhoto.id}')"` : ''}>
            ${firstPhoto ? `<img src="${firstPhoto.data}" alt="prima">
              <div class="lbl">PRIMA — ${new Date(firstPhoto.date).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'2-digit'})}</div>` :
              `<div class="photo-compare-empty">Nessuna foto iniziale</div>`}
          </div>
          <div class="photo-compare-slot" ${lastPhoto && lastPhoto !== firstPhoto ? `onclick="openLightbox('${lastPhoto.id}')"` : ''}>
            ${lastPhoto && lastPhoto !== firstPhoto ? `<img src="${lastPhoto.data}" alt="dopo">
              <div class="lbl">ULTIMA — ${new Date(lastPhoto.date).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'2-digit'})}</div>` :
              `<div class="photo-compare-empty">Carica foto per vedere il confronto</div>`}
          </div>
        </div>
      </div>

      <div class="card">
        <span class="card-label">Ultime osservazioni</span>
        <h3>Note recenti</h3>
        ${recentNotes.length ? recentNotes.map(n => `
          <div class="note-preview">
            <div class="note-preview-date">${new Date(n.date).toLocaleDateString('it-IT',{day:'numeric',month:'long'})}</div>
            <div class="note-preview-text">${escapeHtml(n.text)}</div>
          </div>`).join('') : `<div style="font-style:italic;color:var(--muted);padding:12px 0;">Nessuna nota registrata ancora.</div>`}
      </div>
    </div>

    <div style="margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;">
      <button class="icon-btn accent" onclick="switchStep('strategy')">→ Passa alla strategia</button>
      <button class="icon-btn" onclick="switchStep('measure')">+ Aggiungi misurazione</button>
      <button class="icon-btn" onclick="switchStep('notes')">+ Aggiungi nota</button>
    </div>
  `;
}

function buildChecklist(client, latest, previous, photos, notes) {
  const items = [];

  // 1. Profilo completato
  if (!client.profile.age || !client.profile.height || !client.profile.startWeight) {
    items.push({type:'warn', text:'<strong>Profilo incompleto</strong> — completa età, altezza e peso di partenza.'});
  } else {
    items.push({type:'done', text:`Profilo completo (${client.profile.age}a, ${client.profile.height}cm)`});
  }

  // 2. Ultima misurazione
  if (!latest) {
    items.push({type:'warn', text:'<strong>Nessuna misurazione</strong> — aggiungi la prima rilevazione.'});
  } else {
    const daysAgo = Math.round((new Date() - new Date(latest.date)) / 86400000);
    if (daysAgo > 21) {
      items.push({type:'warn', text:`<strong>Ultima misurazione ${daysAgo} giorni fa</strong> — valuta un nuovo check.`, small:'Consigliato ogni 14-21 giorni'});
    } else {
      items.push({type:'done', text:`Misurazione recente (${daysAgo} giorni fa)`});
    }
  }

  // 3. Trend peso
  if (latest && previous && latest.weight && previous.weight) {
    const dW = latest.weight - previous.weight;
    const dDays = Math.round((new Date(latest.date) - new Date(previous.date)) / 86400000);
    const goal = client.profile.goal;
    if (goal === 'cut') {
      if (dW < -0.1) items.push({type:'done', text:`Peso in calo di <strong>${Math.abs(dW).toFixed(1)} kg</strong> in ${dDays}gg — in linea con l'obiettivo.`});
      else if (dW > 0.3) items.push({type:'warn', text:`Peso in aumento di <strong>+${dW.toFixed(1)} kg</strong> — da valutare (sgarri? acqua? ciclo?).`});
      else items.push({type:'warn', text:`Peso fermo (${dW >= 0 ? '+' : ''}${dW.toFixed(1)} kg in ${dDays}gg) — considera un ulteriore deficit.`});
    } else if (goal === 'bulk') {
      if (dW > 0.1) items.push({type:'done', text:`Peso in aumento di <strong>+${dW.toFixed(1)} kg</strong> — buon progresso.`});
      else if (dW < -0.3) items.push({type:'warn', text:`Peso in calo (${dW.toFixed(1)} kg) — valuta aumento calorico.`});
      else items.push({type:'warn', text:`Peso stabile — valuta surplus maggiore.`});
    } else {
      if (Math.abs(dW) < 0.5) items.push({type:'done', text:`Peso stabile (${dW >= 0 ? '+' : ''}${dW.toFixed(1)} kg) — mantenimento on track.`});
      else items.push({type:'warn', text:`Variazione peso di ${dW >= 0 ? '+' : ''}${dW.toFixed(1)} kg — verificare.`});
    }
  }

  // 4. Circonferenze
  if (latest && previous && latest.waist && previous.waist) {
    const d = latest.waist - previous.waist;
    if (d < -0.5) items.push({type:'done', text:`Girovita ridotto di <strong>${Math.abs(d).toFixed(1)} cm</strong>.`});
    else if (d > 0.5) items.push({type:'warn', text:`Girovita aumentato di <strong>+${d.toFixed(1)} cm</strong>.`});
  }

  // 5. Foto
  if (photos.length === 0) {
    items.push({type:'warn', text:'Nessuna foto caricata — utili per il confronto visivo.'});
  } else if (photos.length >= 2) {
    items.push({type:'done', text:`${photos.length} foto disponibili per confronto visivo.`});
  }

  // 6. Note recenti
  if (notes.length > 0) {
    const lastNote = notes[0];
    const daysAgo = Math.round((new Date() - new Date(lastNote.date)) / 86400000);
    if (daysAgo < 14) items.push({type:'done', text:`Feedback cliente ricevuto ${daysAgo} giorni fa.`});
  } else {
    items.push({type:'warn', text:'Nessun feedback dal cliente registrato.'});
  }

  return items;
}

function saveProfile() {
  const c = getActiveClient();
  if (!c) return;
  c.profile.sex = document.querySelector('input[name="pSex"]:checked').value;
  c.profile.age = +document.getElementById('pAge').value || null;
  c.profile.height = +document.getElementById('pHeight').value || null;
  c.profile.startWeight = +document.getElementById('pWeight').value || null;
  c.profile.activity = +document.getElementById('pActivity').value;
  c.profile.goal = document.querySelector('input[name="pGoal"]:checked').value;
  c.profile.diet = document.getElementById('pDiet').value;
  c.profile.exclusions = [...document.querySelectorAll('.chips .chip input:checked')].map(x => x.value);
  c.profile.trainingDays = +document.getElementById('pTraining').value || 0;
  c.profile.waterL = +document.getElementById('pWater').value || 2;

  if (c.profile.age && c.profile.height && c.profile.startWeight) {
    c.calc = calcTDEE(c.profile);
    // Se non ci sono target manuali, inizializzali dal calc
    if (!c.targets) {
      c.targets = { kcal: c.calc.target, p: c.calc.pG, c: c.calc.cG, f: c.calc.fG };
    }
  }

  saveData();
  renderSidebar();
  renderMain();
}

function calcTDEE(p) {
  let bmr;
  if (p.sex === 'M') bmr = 10 * p.startWeight + 6.25 * p.height - 5 * p.age + 5;
  else bmr = 10 * p.startWeight + 6.25 * p.height - 5 * p.age - 161;
  const tdee = bmr * p.activity;

  let target, goalLabel;
  if (p.goal === 'cut') { target = tdee - 400; goalLabel = 'Deficit calorico (−400 kcal)'; }
  else if (p.goal === 'bulk') { target = tdee + 300; goalLabel = 'Surplus calorico (+300 kcal)'; }
  else { target = tdee; goalLabel = 'Mantenimento isocalorico'; }

  let pPerKg, fPerKg;
  if (p.goal === 'cut') { pPerKg = 2.2; fPerKg = 0.9; }
  else if (p.goal === 'bulk') { pPerKg = 1.8; fPerKg = 1.0; }
  else { pPerKg = 1.8; fPerKg = 0.9; }

  const pG = Math.round(pPerKg * p.startWeight);
  const fG = Math.round(fPerKg * p.startWeight);
  const cG = Math.max(0, Math.round((target - pG*4 - fG*9) / 4));

  return {
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
    target: Math.round(target),
    goalLabel, pG, cG, fG,
  };
}

function renderStrategy(client, profileComplete) {
  if (!profileComplete) {
    return `<div class="empty-state">
      <div class="ornament">❦</div>
      <p>Completa prima il <strong>Profilo</strong> per accedere alla strategia.</p>
      <button class="icon-btn accent" style="margin-top:20px;" onclick="switchStep('profile')">→ Vai al profilo</button>
    </div>`;
  }

  // Se non ci sono target manuali, prendili dal calc
  if (!client.targets && client.calc) {
    client.targets = { kcal: client.calc.target, p: client.calc.pG, c: client.calc.cG, f: client.calc.fG };
  }

  const t = client.targets;
  const calc = client.calc;
  const pKcal = t.p * 4;
  const cKcal = t.c * 4;
  const fKcal = t.f * 9;
  const totalKcal = pKcal + cKcal + fKcal;
  const pPct = Math.round(pKcal / totalKcal * 100);
  const cPct = Math.round(cKcal / totalKcal * 100);
  const fPct = Math.round(fKcal / totalKcal * 100);
  const drift = totalKcal - t.kcal;

  return `
    <div class="strategy-intro">
      <div>
        <h3>Dai feed alla strategia</h3>
        <p>Dopo aver rivisto foto, note e misurazioni nella dashboard, qui <strong>aggiusti i target calorici e i macronutrienti</strong> in base a quello che hai visto. I valori sono liberi — il TDEE calcolato è solo un punto di partenza.</p>
      </div>
      <div class="current-target">
        <div class="lbl">Target attuale</div>
        <div class="val">${t.kcal}<small> kcal</small></div>
      </div>
    </div>

    <div class="targets-editor">
      <h3>Target calorici</h3>
      <div class="sub">— Modifica manualmente i valori —</div>

      <div class="tdee-hero">
        <div>
          <div class="tdee-main-lbl">Fabbisogno target</div>
          <div class="tdee-main-val" id="heroKcal">${t.kcal}<small>kcal/die</small></div>
          <div class="tdee-main-sub">${calc.goalLabel}</div>
        </div>
        <div class="tdee-side">
          <div class="tdee-side-lbl">BMR calcolato</div>
          <div class="tdee-side-val">${calc.bmr}</div>
        </div>
        <div class="tdee-side">
          <div class="tdee-side-lbl">TDEE mantenimento</div>
          <div class="tdee-side-val">${calc.tdee}</div>
        </div>
      </div>

      <div class="field row-4">
        <div>
          <label>Target kcal/die</label>
          <input type="number" id="tKcal" value="${t.kcal}" step="10" oninput="previewTargets()">
        </div>
        <div>
          <label>Proteine (g)</label>
          <input type="number" id="tP" value="${t.p}" step="1" oninput="previewTargets()">
        </div>
        <div>
          <label>Carbo (g)</label>
          <input type="number" id="tC" value="${t.c}" step="1" oninput="previewTargets()">
        </div>
        <div>
          <label>Grassi (g)</label>
          <input type="number" id="tF" value="${t.f}" step="1" oninput="previewTargets()">
        </div>
      </div>

      <div class="macros-row">
        <div class="macro-box" data-m="p">
          <div class="macro-box-label">Proteine</div>
          <div class="macro-box-value"><span id="previewP">${t.p}</span><small>g</small></div>
          <div class="macro-box-sub" id="previewPSub">${pPct}% · ${(t.p/client.profile.startWeight).toFixed(1)} g/kg</div>
        </div>
        <div class="macro-box" data-m="c">
          <div class="macro-box-label">Carboidrati</div>

        ${Math.abs(drift) < 30 ? `✓ Macro coerenti con il target kcal (scarto ${drift >= 0 ? '+' : ''}${drift} kcal)` : `▲ Attenzione: scarto di ${drift >= 0 ? '+' : ''}${drift} kcal tra macro e target`}

        <button class="adjust-btn" onclick="quickAdjust('c',20)">Più carbo<span class="delta">+20 g C</span></button>
        <button class="adjust-btn" onclick="quickAdjust('p',10)">Più proteine<span class="delta">+10 g P</span></button>

}

function previewTargets() {
  const c = getActiveClient();
  const kcal = +document.getElementById('tKcal').value || 0;
  const p = +document.getElementById('tP').value || 0;
  const carb = +document.getElementById('tC').value || 0;
  const f = +document.getElementById('tF').value || 0;

  document.getElementById('heroKcal').innerHTML = `${kcal}<small>kcal/die</small>`;
  document.getElementById('previewP').textContent = p;
  document.getElementById('previewC').textContent = carb;
  document.getElementById('previewF').textContent = f;

  const pKcal = p * 4, cKcal = carb * 4, fKcal = f * 9;
  const total = pKcal + cKcal + fKcal || 1;
  const pPct = Math.round(pKcal/total*100);
  const cPct = Math.round(cKcal/total*100);
  const fPct = Math.round(fKcal/total*100);
  document.getElementById('previewPSub').textContent = `${pPct}% · ${(p/(c.profile.startWeight||1)).toFixed(1)} g/kg`;
  document.getElementById('previewCSub').textContent = `${cPct}%`;
  document.getElementById('previewFSub').textContent = `${fPct}%`;

  const drift = total - kcal;
  const alert = document.getElementById('macroAlert');
  if (Math.abs(drift) < 30) {
    alert.innerHTML = `✓ Macro coerenti con il target kcal (scarto ${drift >= 0 ? '+' : ''}${drift} kcal)`;
    alert.style.color = 'var(--olive)';
  } else {
    alert.innerHTML = `▲ Attenzione: scarto di ${drift >= 0 ? '+' : ''}${drift} kcal tra macro e target`;
    alert.style.color = 'var(--accent)';
  }
}

function saveTargets() {
  const c = getActiveClient();
  c.targets = {
    kcal: +document.getElementById('tKcal').value || 0,
    p: +document.getElementById('tP').value || 0,
    c: +document.getElementById('tC').value || 0,
    f: +document.getElementById('tF').value || 0,
  };
  saveData();
}

function quickAdjust(field, delta) {
  const c = getActiveClient();
  if (!c.targets) return;
  c.targets[field] = Math.max(0, c.targets[field] + delta);
  // Se modifichi kcal, aggiusta solo kcal. Se modifichi un macro, aggiorna anche kcal di conseguenza.
  if (field !== 'kcal') {
    c.targets.kcal = c.targets.p*4 + c.targets.c*4 + c.targets.f*9;
  }
  saveData();
  renderMain();
}

function resetTargets() {
  const c = getActiveClient();
  if (!c.calc) return;
  if (!confirm('Resettare i target ai valori calcolati dal profilo?')) return;
  c.targets = { kcal: c.calc.target, p: c.calc.pG, c: c.calc.cG, f: c.calc.fG };
  saveData();
  renderMain();
}

function initPlanFromTemplate() {
  const c = getActiveClient();
  c.plan = generateDefaultPlan(c);
  saveData();
  renderMain();
}

function initPlanEmpty() {
  const c = getActiveClient();
  c.plan = { meals: [
    { name: 'Colazione', variants: [''] },
    { name: 'Pranzo', variants: [''] },
    { name: 'Cena', variants: [''] },
  ], rules: '' };
  saveData();
  renderMain();
}

function resetPlanFromTemplate() {
  if (!confirm('Sostituire il piano attuale con il template predefinito? Le modifiche andranno perse.')) return;
  initPlanFromTemplate();
}

function clearPlan() {
  if (!confirm('Svuotare completamente il piano?')) return;
  const c = getActiveClient();
  c.plan = null;
  saveData();
  renderMain();
}

function updateMealName(mi, value) {
  const c = getActiveClient();
  c.plan.meals[mi].name = value;
  saveData();
}

function updateVariant(mi, vi, value) {
  const c = getActiveClient();
  c.plan.meals[mi].variants[vi] = value;
  saveData();
}

function addVariant(mi) {
  const c = getActiveClient();
  c.plan.meals[mi].variants.push('');
  saveData(true);
  renderMain();
}

function removeVariant(mi, vi) {
  const c = getActiveClient();
  if (c.plan.meals[mi].variants.length <= 1) {
    alert('Un pasto deve avere almeno una variante.');
    return;
  }
  if (!confirm('Rimuovere questa variante?')) return;
  c.plan.meals[mi].variants.splice(vi, 1);
  saveData();
  renderMain();
}

function addMeal() {
  const c = getActiveClient();
  const name = prompt('Nome del nuovo pasto (es. "Spuntino pomeridiano")?');
  if (!name) return;
  c.plan.meals.push({ name, variants: [''] });
  saveData();
  renderMain();
}

function removeMeal(mi) {
  const c = getActiveClient();
  if (!confirm(`Rimuovere il pasto "${c.plan.meals[mi].name}"?`)) return;
  c.plan.meals.splice(mi, 1);
  saveData();
  renderMain();
}

function moveMeal(mi, dir) {
  const c = getActiveClient();
  const meals = c.plan.meals;
  const ni = mi + dir;
  if (ni < 0 || ni >= meals.length) return;
  [meals[mi], meals[ni]] = [meals[ni], meals[mi]];
  saveData(true);
  renderMain();
}

function updateRules(value) {
  const c = getActiveClient();
  c.plan.rules = value;
  saveData();
}

function renderMeasure(client) {
  const measurements = [...client.measurements].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:500;font-style:italic;">Storico misurazioni</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-top:4px;">${measurements.length} rilevazioni</div>
      </div>
      <button class="btn-primary" style="width:auto;margin:0;" onclick="openMeasureModal()">+ Nuova misurazione</button>
    </div>`;

  if (measurements.length === 0) {
    html += `<div class="empty-state"><div class="ornament">❦</div><p>Nessuna misurazione registrata.</p></div>`;
    return html;
  }

  const reversed = [...measurements].reverse();
  const fields = [
    {k:'weight', label:'Peso', unit:'kg'},
    {k:'waist', label:'Vita', unit:'cm'},
    {k:'hips', label:'Fianchi', unit:'cm'},
    {k:'chest', label:'Petto', unit:'cm'},
    {k:'arm', label:'Braccio', unit:'cm'},
    {k:'thigh', label:'Coscia', unit:'cm'},
    {k:'calf', label:'Polpaccio', unit:'cm'},
  ];

  reversed.forEach((m, idx) => {
    const prev = reversed[idx + 1];
    const date = new Date(m.date).toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'});
    html += `<div class="measurement-entry">
      <div class="measurement-date">
        <span>${date}</span>
        <button class="note-delete" onclick="deleteMeasurement('${m.id}')">Elimina</button>
      </div>
      <div class="measurement-values">
        ${fields.map(f => {
          if (m[f.k] == null) return '';
          const diff = prev && prev[f.k] != null ? (m[f.k] - prev[f.k]) : null;
          let diffHtml = '';
          if (diff !== null && Math.abs(diff) > 0.05) {
            const cls = diff < 0 ? 'diff-down' : 'diff-up';
            diffHtml = `<div class="measurement-val-diff ${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}</div>`;
          }
          return `<div class="measurement-val">
            <div class="measurement-val-label">${f.label}</div>
            <div class="measurement-val-value">${m[f.k]}<small> ${f.unit}</small></div>
            ${diffHtml}
          </div>`;
        }).join('')}
      </div>
      ${m.notes ? `<div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--rule);font-family:'Fraunces',serif;font-style:italic;color:var(--muted);font-size:14px;">${escapeHtml(m.notes)}</div>` : ''}
    </div>`;
  });

  return html;
}

function openMeasureModal() {
  document.getElementById('mDate').value = new Date().toISOString().slice(0,10);
  ['mWeight','mWaist','mHips','mChest','mArm','mThigh','mCalf','mNotes'].forEach(id => { document.getElementById(id).value = ''; });
  const c = getActiveClient();
  if (c && c.measurements.length) {
    const last = c.measurements[c.measurements.length-1];
    if (last.weight) document.getElementById('mWeight').value = last.weight;
  } else if (c && c.profile.startWeight) {
    document.getElementById('mWeight').value = c.profile.startWeight;
  }
  openModal('measureModal');
}

function saveMeasurement() {
  const c = getActiveClient();
  if (!c) return;
  const m = {
    id: uid(),
    date: document.getElementById('mDate').value || new Date().toISOString().slice(0,10),
    weight: +document.getElementById('mWeight').value || null,
    waist: +document.getElementById('mWaist').value || null,
    hips: +document.getElementById('mHips').value || null,
    chest: +document.getElementById('mChest').value || null,
    arm: +document.getElementById('mArm').value || null,
    thigh: +document.getElementById('mThigh').value || null,
    calf: +document.getElementById('mCalf').value || null,
    notes: document.getElementById('mNotes').value.trim(),
  };
  if (!m.weight && !m.waist && !m.hips && !m.chest && !m.arm && !m.thigh && !m.calf) {
    alert('Inserisci almeno una misurazione.');
    return;
  }
  c.measurements.push(m);
  c.measurements.sort((a,b) => new Date(a.date) - new Date(b.date));
  saveData();
  closeModal('measureModal');
  renderSidebar();
  renderMain();
}

function deleteMeasurement(id) {
  if (!confirm('Eliminare questa misurazione?')) return;
  const c = getActiveClient();
  c.measurements = c.measurements.filter(m => m.id !== id);
  saveData();
  renderMain();
}

    sorted.forEach(ph => {
      const date = new Date(ph.date).toLocaleDateString('it-IT', {day:'numeric', month:'short', year:'numeric'});
      html += `<div class="photo-item" onclick="openLightbox('${ph.id}')">
        <img src="${ph.data}" alt="${date}">
        <button class="photo-item-delete" onclick="event.stopPropagation();deletePhoto('${ph.id}')">×</button>
        <div class="photo-item-overlay">${date}</div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function uploadPhotos(event) {
  const c = getActiveClient();
  if (!c) return;
  const files = [...event.target.files];
  let remaining = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxDim = 1200;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        c.photos.push({
          id: uid(),
          date: new Date().toISOString(),
          data: canvas.toDataURL('image/jpeg', 0.75),
          label: '',
        });
        remaining--;
        if (remaining === 0) {
          saveData();
          renderMain();
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function deletePhoto(id) {
  if (!confirm('Eliminare questa foto?')) return;
  const c = getActiveClient();
  c.photos = c.photos.filter(p => p.id !== id);
  saveData();
  renderMain();
}

function openLightbox(id) {
  const c = getActiveClient();
  const photo = c.photos.find(p => p.id === id);
  if (!photo) return;
  document.getElementById('lightboxImg').src = photo.data;
  document.getElementById('lightbox').classList.add('show');
}

// NOTES
function renderNotes(client) {
  let html = `
    <div>
      <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:500;font-style:italic;margin-bottom:4px;">Note e feedback</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:20px;">Preferenze · Trascrizioni note vocali · Osservazioni</div>

      <div class="card" style="padding:24px;margin-bottom:20px;">
        <span class="card-label">Nuova nota</span>
        <div class="field">
          <label>Testo</label>
          <textarea id="newNoteText" placeholder="Es: 'Non mi piace il pesce azzurro, preferisco il salmone. In settimana sono più fuori a pranzo...' oppure trascrivi direttamente una nota vocale del cliente."></textarea>
        </div>
        <button class="btn-primary" onclick="addNote()" style="width:auto;">Salva nota</button>
      </div>`;

  if (client.notes.length === 0) {
    html += `<div class="empty-state"><div class="ornament">❦</div><p>Nessuna nota ancora.</p></div></div>`;
    return html;
  }

  const sorted = [...client.notes].sort((a,b) => new Date(b.date) - new Date(a.date));
  sorted.forEach(n => {
    const date = new Date(n.date).toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'});
    html += `<div class="note-entry">
      <div class="note-date">
        <span>${date}</span>
        <button class="note-delete" onclick="deleteNote('${n.id}')">Elimina</button>
      </div>
      <div class="note-content">${escapeHtml(n.text)}</div>
    </div>`;
  });

  html += '</div>';
  return html;
}

function addNote() {
  const text = document.getElementById('newNoteText').value.trim();
  if (!text) return alert('Scrivi qualcosa prima di salvare.');
  const c = getActiveClient();
  c.notes.push({ id: uid(), date: new Date().toISOString(), text });
  saveData();
  renderMain();
}

function deleteNote(id) {
  if (!confirm('Eliminare questa nota?')) return;
  const c = getActiveClient();
  c.notes = c.notes.filter(n => n.id !== id);
  saveData();
  renderMain();
}

// === INIT ===
loadData();
renderSidebar();
renderMain();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.show').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.lightbox.show').forEach(m => m.classList.remove('show'));
  }
});

// === SERVICE WORKER (PWA) ===
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered', reg.scope))
      .catch(err => console.log('SW registration failed', err));
  });
}
